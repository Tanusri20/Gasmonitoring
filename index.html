<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Automated Sewage Gas Monitoring with Safe Distance Estimation</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#071d25;
color:white;
text-align:center;
}

h1{
padding:20px;
background:#0f2f3b;
margin:0;
}

.section{
padding:25px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
flex:1 1 260px;
padding:25px;
border-radius:10px;
background:#132f3b;
font-size:20px;
font-weight:bold;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.mq7{border-left:6px solid #ff5722;}
.mq2{border-left:6px solid #03a9f4;}
.mq3{border-left:6px solid #9c27b0;}

.status{
display:inline-block;
padding:12px 40px;
border-radius:25px;
font-size:24px;
font-weight:bold;
}

.safe{background:#2ecc71;}
.warning{background:#f39c12;}
.danger{background:#e74c3c;animation:blink 1s infinite;}

@keyframes blink{
50%{opacity:0.4;}
}

.analysis-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:25px;
}

.analysis-card{
flex:1 1 300px;
background:#102832;
padding:25px;
border-radius:10px;
font-size:18px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.green{color:#2ecc71;}
.yellow{color:#f1c40f;}
.orange{color:#e67e22;}
.red{color:#e74c3c;}

#map{
width:90%;
height:400px;
margin:40px auto;
border-radius:15px;
}

</style>
</head>

<body>

<h1>Automated Sewage Gas Monitoring with Safe Distance Estimation</h1>

<div class="section">

<div class="container">

<div id="mq7" class="card mq7">MQ7 (CO)</div>
<div id="mq2" class="card mq2">MQ2 (Methane, LPG)</div>
<div id="mq3" class="card mq3">MQ3 (Ammonia)</div>

</div>

<br>

<h2>Status</h2>
<div id="status" class="status">Loading...</div>

<div class="analysis-container">

<div class="analysis-card">
<h3>Gas Spread Analysis</h3>
<div id="spreadStatus">Analyzing...</div>
</div>

<div class="analysis-card">
<h3>Danger Prediction</h3>
<div id="dangerStatus">Analyzing...</div>
</div>

<div class="analysis-card">
<h3>LiDAR Proximity Monitoring</h3>
<div id="lidarStatus">Analyzing...</div>
</div>

</div>

</div>

<div id="map"></div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyC8RYdobKRYnhLMlWMIpQ9dU399UnSX0SE",
databaseURL: "https://tempproject-2dad0-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// MAP
let map = L.map('map').setView([18.463926,83.660092],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker = L.marker([18.463926,83.660092]).addTo(map);


// FIREBASE LISTENER
db.ref("ESP32").on("value",snap=>{

let d = snap.val();
if(!d) return;


// GAS VALUES
let mq7 = d.Gas.MQ7 || 0;
let mq2 = d.Gas.MQ2 || 0;
let mq3 = d.Gas.MQ3 || 0;

document.getElementById("mq7").innerHTML="MQ7 (CO)<br>"+mq7.toFixed(2)+" PPM";
document.getElementById("mq2").innerHTML="MQ2 (Methane, LPG)<br>"+mq2.toFixed(2)+" PPM";
document.getElementById("mq3").innerHTML="MQ3 (Ammonia)<br>"+mq3.toFixed(2)+" PPM";


// STATUS
let status=d.Gas.Status;

let s=document.getElementById("status");
s.innerHTML=status;
s.className="status";

if(status=="SAFE") s.classList.add("safe");
else if(status=="WARNING") s.classList.add("warning");
else s.classList.add("danger");


// SPREAD ANALYSIS
let spread = d.Gas.SpreadRate || 0;

let spreadText="";
let spreadClass="green";

if(spread <=2){
spreadText="STABLE ("+spread.toFixed(2)+" PPM/sec)";
spreadClass="green";
}
else if(spread<=8){
spreadText="MODERATE GAS RISE ("+spread.toFixed(2)+" PPM/sec)";
spreadClass="yellow";
}
else{
spreadText="RAPID GAS SPREAD ("+spread.toFixed(2)+" PPM/sec)";
spreadClass="red";
}

document.getElementById("spreadStatus").innerHTML=
"<span class='"+spreadClass+"'>"+spreadText+"</span>";


// DANGER PREDICTION
let time = d.Gas.TimeToDanger || 0;

let dangerText="";
let dangerClass="green";

if(time==0 && status=="SAFE"){
dangerText="NO IMMEDIATE RISK";
dangerClass="green";
}
else if(time>60){
dangerText="APPROACHING RISK ("+Math.round(time)+" sec)";
dangerClass="yellow";
}
else if(time>20){
dangerText="HIGH RISK ("+Math.round(time)+" sec)";
dangerClass="orange";
}
else if(time>0){
dangerText="CRITICAL - EVACUATE ("+Math.round(time)+" sec)";
dangerClass="red";
}
else{
dangerText="STABLE";
dangerClass="green";
}

document.getElementById("dangerStatus").innerHTML=
"<span class='"+dangerClass+"'>"+dangerText+"</span>";


// LIDAR
let lidarDist = d.Lidar.Distance_cm || 0;
let lidarStat = d.Lidar.Status || "CLEAR";

let lidarColor="green";

if(lidarStat=="PERSON NEAR") lidarColor="red";
else if(lidarStat=="OBJECT DETECTED") lidarColor="orange";

document.getElementById("lidarStatus").innerHTML=
"<span class='"+lidarColor+"'>"+lidarStat+" ("+lidarDist+" cm)</span>";


// MAP LOCATION
let lat=d.Location.Latitude;
let lon=d.Location.Longitude;

marker.setLatLng([lat,lon]);
map.setView([lat,lon],15);

});

</script>

</body>
</html>
